<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor Pro - Optimize Your Images Online</title>
    <meta name="description" content="Free online image compressor tool with adjustable compression levels. Reduce image file sizes without losing quality. Supports JPEG, PNG, and WebP formats.">
    <meta name="keywords" content="image compressor, optimize images, reduce file size, JPEG compression, PNG optimization">
    <meta name="author" content="Your Company Name">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Image Compressor Pro">
    <meta property="og:description" content="Free online image compressor tool with adjustable compression levels">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://yourdomain.com/image-compressor">
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Image Compressor Pro",
        "description": "Online image optimization tool with adjustable compression levels",
        "applicationCategory": "Multimedia",
        "operatingSystem": "Web"
    }
    </script>

    <style>
        :root {
            --primary-color: #2196F3;
            --secondary-color: #607D8B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 2rem 0;
            background-color: var(--primary-color);
            color: white;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
        }

        .compression-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }

        .ad-section {
            background: #fff;
            padding: 15px;
            text-align: center;
        }

        .file-input {
            margin: 20px 0;
            padding: 15px;
            border: 2px dashed var(--secondary-color);
            border-radius: 8px;
            text-align: center;
        }

        .preview-container {
            max-width: 100%;
            margin: 20px 0;
            text-align: center;
        }

        #imagePreview {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .controls {
            margin: 20px 0;
        }

        .quality-slider {
            width: 100%;
            margin: 15px 0;
        }

        .download-btn {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .download-btn:hover {
            background-color: #1976D2;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .ad-section {
                order: -1;
            }
        }
    </style>
</head>
<body>
    <!-- Header Ad Section -->
    <div class="ad-section">
        <!-- Replace with your Google AdSense code -->
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
                crossorigin="anonymous"></script>
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
             data-ad-slot="XXXXXXXXXX"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <header class="header">
        <h1>Image Compressor Pro</h1>
        <p>Optimize your images for web with adjustable quality settings</p>
    </header>

    <main class="main-content">
        <div class="compression-section">
            <div class="file-input">
                <input type="file" id="imageInput" accept="image/*">
                <p>Drag and drop images or click to upload</p>
            </div>

            <div class="preview-container">
                <canvas id="imagePreview"></canvas>
            </div>

            <div class="controls">
                <label for="quality">Compression Quality: <span id="qualityValue">80</span>%</label>
                <input type="range" id="quality" class="quality-slider" min="1" max="100" value="80">
                <button class="download-btn" id="compressBtn">Compress & Download</button>
            </div>
        </div>

        <!-- Sidebar Ad Section -->
        <div class="ad-section">
            <!-- Replace with your Google AdSense code -->
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX"
                    crossorigin="anonymous"></script>
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
                 data-ad-slot="XXXXXXXXXX"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </main>

    <script>
        const imageInput = document.getElementById('imageInput');
        const qualitySlider = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        const compressBtn = document.getElementById('compressBtn');
        const previewCanvas = document.getElementById('imagePreview');
        const ctx = previewCanvas.getContext('2d');

        // Update quality percentage display
        qualitySlider.addEventListener('input', () => {
            qualityValue.textContent = qualitySlider.value;
        });

        // Handle image upload and preview
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    previewCanvas.width = img.width;
                    previewCanvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // Compression and download handler
        compressBtn.addEventListener('click', () => {
            if (!imageInput.files[0]) {
                alert('Please select an image first!');
                return;
            }

            const quality = qualitySlider.value / 100;
            previewCanvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `compressed-${Date.now()}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 'image/jpeg', quality);
        });
    </script>
</body>
</html>
